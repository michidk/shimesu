<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07110f">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2307110f'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%2372e6b3'/%3E%3C/svg%3E">
  <title>404 | shimesu</title>
  <style>
    :root {
      color-scheme: dark;
      --surface-primary: #07110f;
      --surface-elevated: #132720;
      --text-primary: #edf8f3;
      --text-secondary: #a9beb5;
      --border-subtle: #1a332b;
      --accent-primary: #72e6b3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--surface-primary);
      color: var(--text-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    main {
      text-align: center;
      padding: 48px 24px;
      max-width: 28rem;
    }
    .code {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--accent-primary);
      margin: 0;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 8px 0 12px;
    }
    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
      font-size: 0.9375rem;
    }
    .badge {
      display: inline-block;
      margin-top: 32px;
      padding: 6px 14px;
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      background: var(--surface-elevated);
      color: var(--text-secondary);
      font-size: 0.8125rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>Nothing published here</h1>
    <p>This page does not exist, or the site it belonged to has been removed.</p>
    <span class="badge">served by shimesu</span>
  </main>
</body>
</html>
